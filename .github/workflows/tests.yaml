name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - openh-rf

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/tue-bmd/zea/all-cpu
  MAIN_REPO: tue-bmd/zea
  HF_CACHE_HOST: /cache/huggingface
  HF_CACHE_CONTAINER: /cache/huggingface
  ZEA_CACHE_HOST: /cache/zea
  ZEA_CACHE_CONTAINER: /cache/zea

jobs:
  tag:
    uses: ./.github/workflows/set-tag.yaml

  image:
    needs: [tag]
    runs-on: ubuntu-latest
    timeout-minutes: 100
    permissions:
      contents: read
      packages: write
    outputs:
      docker_image: ${{ steps.set-image.outputs.docker_image }}
      needs_artifact: ${{ steps.set-image.outputs.needs_artifact }}
    steps:
      - name: Debug repository context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Is main repo: ${{ github.repository == 'tue-bmd/zea' }}"
          echo "Repository owner: ${{ github.repository_owner }}"
          echo "Event name: ${{ github.event_name }}"
          echo "PR head repo: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "PR base repo: ${{ github.event.pull_request.base.repo.full_name }}"
          echo "Is fork PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}"

      - name: Free up disk space
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /opt/hostedtoolcache
          echo "Disk space after cleanup:"
          df -h

      # Always checkout — fork PRs need it for diff detection and local builds
      - name: Checkout repository
        uses: actions/checkout@v6

      # Always set up buildx — fork PRs need it for local builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CI Docker image
        id: build
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: |
            INSTALL_JAX=cpu
            INSTALL_TORCH=cpu
            INSTALL_TF=cpu
            DEV=true
          push: true
          tags: |
            ${{ env.BASE_IMAGE }}:${{ needs.tag.outputs.docker_tag }}
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('{0}:latest', env.BASE_IMAGE) || '' }}
            ${{ github.event_name == 'push' && format('{0}:{1}', env.BASE_IMAGE, github.ref_name) || '' }}
          cache-from: type=registry,ref=ghcr.io/tue-bmd/zea/build-cache:all-cpu
          cache-to: type=registry,ref=ghcr.io/tue-bmd/zea/build-cache:all-cpu,mode=max

      # Fork PRs: detect whether Dockerfile or dependency files changed vs base branch.
      # If unchanged, the existing base-branch image is fully compatible — no build needed.
      - name: Check if image needs rebuilding (fork PR)
        id: image-check
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          if git diff --quiet origin/${{ github.event.pull_request.base.ref }} -- Dockerfile pyproject.toml poetry.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No image-relevant files changed — will reuse base branch image"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "ℹ️ Image-relevant files changed — will build locally"
          fi

      # Fork PRs: build image locally (no push) only when deps/Dockerfile actually changed.
      # Reads from the registry build cache so hits are fast even without write access.
      - name: Build CI Docker image (fork PR)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && steps.image-check.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: |
            INSTALL_JAX=cpu
            INSTALL_TORCH=cpu
            INSTALL_TF=cpu
            DEV=true
          push: false
          tags: zea-fork:local
          outputs: type=docker,dest=/tmp/fork-image.tar
          cache-from: type=registry,ref=ghcr.io/tue-bmd/zea/build-cache:all-cpu

      - name: Upload fork PR image artifact
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && steps.image-check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fork-pr-image
          path: /tmp/fork-image.tar
          retention-days: 1

      - name: Set Docker image for tests
        id: set-image
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            # Fork PR
            if [ "${{ steps.image-check.outputs.changed }}" = "true" ]; then
              # Deps/Dockerfile changed: use the locally built image (loaded from artifact by test jobs)
              DOCKER_IMAGE="zea-fork:local"
              NEEDS_ARTIFACT="true"
              echo "✅ Fork PR (image changed): using locally built image"
            else
              # No image change: reuse the pre-built image for the target branch
              DOCKER_IMAGE="${{ env.BASE_IMAGE }}:${{ github.event.pull_request.base.ref }}"
              NEEDS_ARTIFACT="false"
              echo "✅ Fork PR (no image change): reusing $DOCKER_IMAGE"
            fi
          else
            # Same-repo PR or push: use the freshly built tagged image
            DOCKER_IMAGE="${{ env.BASE_IMAGE }}:${{ needs.tag.outputs.docker_tag }}"
            NEEDS_ARTIFACT="false"
            echo "✅ Main repo: using $DOCKER_IMAGE"
          fi
          echo "docker_image=$DOCKER_IMAGE" >> $GITHUB_OUTPUT
          echo "needs_artifact=$NEEDS_ARTIFACT" >> $GITHUB_OUTPUT

  tests:
    needs: [image]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Git
        run: git config --global safe.directory $GITHUB_WORKSPACE

      - name: Download fork PR image artifact
        if: needs.image.outputs.needs_artifact == 'true'
        uses: actions/download-artifact@v4
        with:
          name: fork-pr-image

      - name: Load Docker image
        if: needs.image.outputs.needs_artifact == 'true'
        run: docker load < fork-image.tar

      - name: Run Pytest in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/zea" \
            -w /zea \
            ${{ needs.image.outputs.docker_image }} \
            sh -c "pip install -e .[tests] && pytest --cov --cov-branch --cov-report=xml -p no:cacheprovider -m 'not heavy and not notebook' ./tests"

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ env.MAIN_REPO }}
          flags: unit

  heavy-tests:
    needs: [image]
    runs-on: self-hosted
    timeout-minutes: 100
    concurrency:
      group: heavy-tests-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download fork PR image artifact
        if: needs.image.outputs.needs_artifact == 'true'
        uses: actions/download-artifact@v4
        with:
          name: fork-pr-image

      - name: Load Docker image
        if: needs.image.outputs.needs_artifact == 'true'
        run: docker load < fork-image.tar

      - name: Run heavy tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/zea" \
            -v $HF_CACHE_HOST:$HF_CACHE_CONTAINER \
            -v $ZEA_CACHE_HOST:$ZEA_CACHE_CONTAINER \
            -e HF_HOME=$HF_CACHE_CONTAINER \
            -e HUGGINGFACE_HUB_CACHE=$HF_CACHE_CONTAINER \
            -e ZEA_CACHE_DIR=$ZEA_CACHE_CONTAINER \
            -w /zea \
            ${{ needs.image.outputs.docker_image }} \
            sh -lc "pytest --cov --cov-branch --cov-report=xml -p no:cacheprovider -m 'heavy' ./tests"

      - name: Upload heavy test results to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ env.MAIN_REPO }}
          flags: heavy

  notebook-tests:
    name: notebook-tests (${{ matrix.label }})
    needs: [image]
    runs-on: self-hosted
    timeout-minutes: 100
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent
            dirs: agent
            label: agent
          - name: models
            dirs: models
            label: models
          - name: pipeline
            dirs: pipeline
            label: pipeline
          - name: data-metrics
            dirs: "data metrics"
            label: data+metrics
    concurrency:
      group: notebook-tests-${{ matrix.name }}-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download fork PR image artifact
        if: needs.image.outputs.needs_artifact == 'true'
        uses: actions/download-artifact@v4
        with:
          name: fork-pr-image

      - name: Load Docker image
        if: needs.image.outputs.needs_artifact == 'true'
        run: docker load < fork-image.tar

      - name: Run ${{ matrix.name }} notebook tests
        run: |
          DIRS_ARGS=$(echo "${{ matrix.dirs }}" | tr ' ' '\n' | sed 's/^/--notebook-dir /' | tr '\n' ' ')
          docker run --rm \
            -v "${{ github.workspace }}:/zea" \
            -v ${{ env.HF_CACHE_HOST }}:${{ env.HF_CACHE_CONTAINER }} \
            -v ${{ env.ZEA_CACHE_HOST }}:${{ env.ZEA_CACHE_CONTAINER }} \
            -e HF_HOME=${{ env.HF_CACHE_CONTAINER }} \
            -e HUGGINGFACE_HUB_CACHE=${{ env.HF_CACHE_CONTAINER }} \
            -e ZEA_CACHE_DIR=${{ env.ZEA_CACHE_CONTAINER }} \
            -w /zea \
            ${{ needs.image.outputs.docker_image }} \
            sh -lc "pytest -p no:cacheprovider -s -m 'notebook' $DIRS_ARGS"

  test-docs-build:
    needs: [image]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Git
        run: git config --global safe.directory $GITHUB_WORKSPACE

      - name: Download fork PR image artifact
        if: needs.image.outputs.needs_artifact == 'true'
        uses: actions/download-artifact@v4
        with:
          name: fork-pr-image

      - name: Load Docker image
        if: needs.image.outputs.needs_artifact == 'true'
        run: docker load < fork-image.tar

      - name: Build documentation with Sphinx (fails on warnings)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/zea" \
            -w /zea/docs \
            ${{ needs.image.outputs.docker_image }} \
            sh -c "\
              sudo apt-get update && \
              sudo apt-get install -y pandoc && \
              pip install -e ..[docs] && \
              export PATH=\"/tmp/.local/bin:\$PATH\" && \
              export ZEA_LOG_LEVEL=ERROR && \
              make docs-clean && \
              make docs-build SPHINXOPTS='-W --keep-going' && \
              make docs-test \
            "
